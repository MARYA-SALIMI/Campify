name: Backend CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  # =============================================
  # Lint ve Test
  # =============================================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Bagimliliklari yukle
        run: npm ci
        working-directory: ./server

      - name: Lint kontrolu
        run: |
          echo "Kod kalite kontrolu yapiliyor..."
          npx --yes eslint src/ --ext .js --no-error-on-unmatched-pattern || true
        working-directory: ./server

      - name: Proje yapisini kontrol et
        run: |
          echo "=== Proje Yapisi ==="
          echo "Controllers:"
          ls -la src/controllers/ || true
          echo "Models:"
          ls -la src/models/ || true
          echo "Services:"
          ls -la src/services/ || true
          echo "Config:"
          ls -la src/config/ || true
          echo "Workers:"
          ls -la src/workers/ || true
          echo "=== Kontrol Tamamlandi ==="
        working-directory: ./server

  # =============================================
  # Docker Image Build
  # =============================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Docker Buildx kur
        uses: docker/setup-buildx-action@v3

      - name: Docker image build et
        run: |
          echo "Docker image build ediliyor..."
          docker build -t campify-backend:latest ./server
          echo "Docker image basariyla build edildi!"

      - name: Docker Compose kontrolu
        run: |
          echo "Docker Compose dosyasi kontrol ediliyor..."
          docker compose config
          echo "Docker Compose dosyasi gecerli!"

  # =============================================
  # Deploy (Sadece main branch)
  # =============================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy bildirimi
        run: |
          echo "========================================="
          echo "  Campify Backend Deploy Baslatiliyor"
          echo "  Branch: ${{ github.ref }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Tarih: $(date)"
          echo "========================================="

      # Render otomatik deploy webhook (opsiyonel)
      # - name: Render Deploy Webhook
      #   run: |
      #     curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
